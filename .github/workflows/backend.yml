name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - global.json
      - .github/workflows/backend.yml
  pull_request:
    paths:
      - backend/**
      - global.json
      - .github/workflows/backend.yml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore backend/Tourin.Backend.sln

      - name: Build
        run: dotnet build backend/Tourin.Backend.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Tourin.Backend.sln --configuration Release --no-build
